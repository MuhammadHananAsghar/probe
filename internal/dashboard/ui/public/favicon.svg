  <circle cx="16" cy="16" r="13" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.4"/>
  <!-- Signal waves (concentric arcs) -->
  <path d="M 8 16 A 8 8 0 0 1 24 16" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 5 16 A 11 11 0 0 1 27 16" fill="none" stroke="#a855f7" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
  <!-- Center dot — the probe tip -->
  <circle cx="16" cy="16" r="3" fill="#a855f7"/>
  <circle cx="16" cy="16" r="1.5" fill="#e9d5ff"/>
  <!-- Small tick marks -->
  <line x1="16" y1="4" x2="16" y2="6" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="28" y1="16" x2="26" y2="16" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="4" y1="16" x2="6" y2="16" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>
