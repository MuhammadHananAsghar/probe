version: 2

project_name: probe

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: probe
    main: ./cmd/probe
    binary: probe
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildDate={{.Date}}

archives:
  - id: probe
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE*
      - README*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

brews:
  - repository:
      owner: MuhammadHananAsghar
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/MuhammadHananAsghar/probe"
    description: "Universal LLM API Debugger — intercept, inspect, and replay every AI call your app makes."
    license: "MIT"
    install: |
      bin.install "probe"
    test: |
      system "#{bin}/probe", "version"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: MuhammadHananAsghar
    name: probe
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## probe {{.Version}}

    Universal LLM API Debugger — intercepts every LLM API call your app makes.
